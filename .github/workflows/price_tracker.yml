name: PriceTracker
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright python-dotenv requests pytest
          playwright install chromium
          playwright install-deps chromium

      - name: Run tests
        run: pytest tests/ -v

  track-price:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright python-dotenv requests pytest
          playwright install chromium
          playwright install-deps chromium

      - name: Run price tracker
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python tracker.py

      - name: Save price history
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add last_price.json price_history.csv lowest_price.json
          git diff --cached --quiet || git commit -m "Update price history"
          git pull --rebase
          git push
